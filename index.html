<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Metal Scene - Mobile Core Engine</title>

    <style>
        :root {
            --bg-dark: #09090b;
            --bg-deep: #030304;
            --bg-card: #121216;
            --bg-input: #1a1a22;
            --accent-red: #ef4444;
            --accent-red-glow: rgba(239, 68, 68, 0.15);
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.15);
            --accent-purple: #a855f7;
            --accent-purple-glow: rgba(168, 85, 247, 0.15);
            --text-light: #fafafa;
            --text-gray: #a1a1aa;
            --border-color: #1f1f23;
            --panel-shadow: 0 10px 30px -10px rgba(0,0,0,0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); display: flex; height: 100vh; overflow: hidden; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }

        /* Navigation Sidebar */
        nav { width: 280px; background-color: var(--bg-deep); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; }
        .logo { font-size: 22px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; padding-left: 10px; }
        .logo span { color: var(--accent-red); }
        .nav-section-title { font-size: 11px; text-transform: uppercase; color: var(--text-gray); letter-spacing: 1.5px; margin: 25px 0 10px 10px; font-weight: 700; }
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        .nav-item { padding: 14px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s ease; color: var(--text-gray); }
        .nav-item:hover { background-color: #16161e; color: var(--text-light); }
        .nav-item.active { background-color: var(--bg-card); color: var(--text-light); border: 1px solid var(--border-color); }
        .nav-item.active-red { border-left: 4px solid var(--accent-red); background-color: var(--bg-card); color: white; }
        .nav-item.active-blue { border-left: 4px solid var(--accent-blue); background-color: var(--bg-card); color: white; }
        .nav-item.active-purple { border-left: 4px solid var(--accent-purple); background-color: var(--bg-card); color: white; }

        /* Workspace Core Window Shell */
        main { flex: 1; padding: 40px; overflow-y: auto; display: flex; gap: 40px; }
        .workspace { flex: 2; min-width: 0; }
        .section { display: none; }
        .section.active { display: block; }
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 6px; text-transform: uppercase; letter-spacing: -0.5px; }
        .subtitle { color: var(--text-gray); font-size: 14px; margin-bottom: 35px; }

        /* Feed & Matrix Elements Layouts */
        .feed-container { display: flex; flex-direction: column; gap: 30px; }
        .festival-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .poster-card { position: relative; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; display: flex; height: 240px; cursor: pointer; box-shadow: var(--panel-shadow); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s; }
        .poster-img-layer { width: 40%; background-size: cover; background-position: center; position: relative; flex-shrink: 0; border-right: 1px solid var(--border-color); }
        .poster-details { padding: 30px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .poster-card.rip:hover { border-color: var(--accent-red); transform: translateY(-4px); }
